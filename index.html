<!DOCTYPE html>
<html>
<head>
  <title>MedPal</title>
  <style>
    body { font-family: Arial; padding: 40px; background: #f4fdf6; }
    textarea { width: 300px; height: 100px; }
    button { padding: 10px; margin-top: 10px; }
    pre { background: #fff; padding: 10px; }
  </style>
</head>
<body>

  <h1>🩺 MedPal – AI Health Diary</h1>

  <textarea id="input" placeholder="Enter symptoms..."></textarea><br>
  <button onclick="generate()">Generate Summary</button>

  <h3>Output:</h3>
  <pre id="output"></pre>

  <script>
    function generate() {
  const input = document.getElementById("input").value.toLowerCase();

  if (!input) {
    alert("Please enter symptoms");
    return;
  }

  let symptoms = [];

  if (input.includes("fever")) symptoms.push("Fever");
  if (input.includes("headache")) symptoms.push("Headache");
  if (input.includes("cough")) symptoms.push("Cough");
  if (input.includes("cold")) symptoms.push("Cold");

  if (symptoms.length === 0) {
    symptoms.push("General discomfort");
  }

  const output = `
Symptoms: ${symptoms.join(", ")}
Duration: Based on user input
Severity: Mild
Possible Concern: Common viral infection
  `;

  document.getElementById("output").innerText = output;
}
  </script>

</body>
</html>
